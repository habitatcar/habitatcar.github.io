<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Comercios - Versión Simple</title>
</head>
<body>
    <h1>Lista de Comercios</h1>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5M0kPsdU8Hk_YX3uEahfoQ5k9PD8SUXM",
            authDomain: "habitatcar-pro.firebaseapp.com",
            projectId: "habitatcar-pro",
            storageBucket: "habitatcar-pro.firebasestorage.app",
            messagingSenderId: "311691258694",
            appId: "1:311691258694:web:17a09051dcea7707af9347"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Escuchar cambios en la colección comercios
        onSnapshot(collection(db, "comercios"), (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = ''; // Limpiar lista
            
            snap.forEach(doc => {
                const data = doc.data();
                lista.innerHTML += `
                    <div style="border:1px solid white; margin:10px; padding:10px; background:#f0f0f0;">
                        <p><strong>ID Firebase:</strong> ${doc.id}</p>
                        <p><strong>Nombre:</strong> ${data.nombre || 'Sin nombre'}</p>
                        <p><strong>ID Comercio:</strong> ${data.idComercio || ''}</p>
                        <p><strong>Estado:</strong> ${data.estado || ''}</p>
                        <p><strong>Publicado:</strong> ${data.publicado ? 'Sí' : 'No'}</p>
                        <hr>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
