<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase</title>
</head>
<body>
    <h1>Comercios en Firebase</h1>
    <div id="output"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5M0kPsdU8Hk_YX3uEahfoQ5k9PD8SUXM",
            authDomain: "habitatcar-pro.firebaseapp.com",
            projectId: "habitatcar-pro",
            storageBucket: "habitatcar-pro.firebasestorage.app",
            messagingSenderId: "311691258694",
            appId: "1:311691258694:web:17a09051dcea7707af9347"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const output = document.getElementById('output');
        
        try {
            const snapshot = await getDocs(collection(db, "comercios"));
            output.innerHTML = `<p style="color:green">✅ Encontrados: ${snapshot.size} documentos</p>`;
            
            snapshot.forEach(doc => {
                const data = doc.data();
                output.innerHTML += `<p>📄 ${doc.id} - ${data.nombre || 'sin nombre'}</p>`;
            });
        } catch (error) {
            output.innerHTML = `<p style="color:red">❌ Error: ${error.message}</p>`;
        }
    </script>
</body>
</html>
