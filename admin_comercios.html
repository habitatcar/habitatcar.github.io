<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TEST - Admin Comercios</title>
</head>
<body>
    <h1>Lista de Comercios (Test)</h1>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5M0kPsdU8Hk_YX3uEahfoQ5k9PD8SUXM",
            authDomain: "habitatcar-pro.firebaseapp.com",
            projectId: "habitatcar-pro",
            storageBucket: "habitatcar-pro.firebasestorage.app",
            messagingSenderId: "311691258694",
            appId: "1:311691258694:web:17a09051dcea7707af9347"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const snapshot = await getDocs(collection(db, "comercios"));
        const lista = document.getElementById('lista');
        
        snapshot.forEach(doc => {
            const data = doc.data();
            lista.innerHTML += `<p><strong>${data.nombre || 'Sin nombre'}</strong> - ID: ${data.idComercio || ''}</p>`;
        });
    </script>
</body>
</html>
