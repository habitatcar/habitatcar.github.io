<style>
:root {
--azul-oscuro: #0a192f;
--azul-medio: #334766;
--azul-claro: #415a77;
--celeste-habitat: #004a99;
--blanco-suave: #e6f1ff;
--borravino: #800020;
--verde: #28a745;
--verde-publicado: #2e7d32;
--rojo: #dc3545;
--oro: #ffc107;
--naranja: #ff8c00;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: var(--azul-oscuro);
color: var(--blanco-suave);
margin: 0;
padding: 0;
}
#capa-seguridad {
position: fixed; top:0; left:0; width:100%; height:100%;
background: var(--azul-oscuro); z-index: 9999; display: flex;
justify-content: center; align-items: center; font-weight: bold;
}
.header {
background: var(--azul-medio);
padding: 15px 30px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 4px solid var(--celeste-habitat);
position: sticky;
top: 0;
z-index: 1100;
}
.logo { height: 90px; width: auto; }
.nav-menu { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-link {
padding: 8px 15px;
border-radius: 6px;
text-decoration: none;
color: white;
font-weight: bold;
background: var(--azul-claro);
transition: 0.3s;
font-size: 12px;
}
.nav-link.active { background: var(--rojo); box-shadow: 0 0 10px rgba(220, 53, 69, 0.5); }
.nav-link-validaciones {
background: var(--naranja);
color: var(--azul-oscuro);
}
.nav-link-validaciones:hover {
background: #e67e22;
}
.tools-faja {
position: sticky;
top: 124px;
z-index: 1000;
background: #ffffff;
padding: 11px 30px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 15px rgba(0,0,0,0.4);
flex-wrap: wrap;
gap: 15px;
}
.search-container { position: relative; flex: 1; max-width: 350px; }
.search-input {
width: 100%; padding: 10px 12px 10px 45px;
border: 2px solid var(--borravino);
border-radius: 25px; outline: none; font-size: 1em;
color: #1a1a1a;
font-weight: 600;
background: #fff;
}
.search-icon { position: absolute; left: 18px; top: 12px; color: var(--borravino); font-size: 1.1em; }
.btn-tool {
padding: 8px 12px; border: 2px solid var(--borravino);
background: white; color: var(--borravino);
cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; font-size: 0.9em;
}
.btn-tool.active { background: var(--borravino); color: white; }
.stat-badge { padding: 6px 12px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.8em; display: flex; align-items: center; gap: 5px; }
.wrapper { max-width: 1600px; margin: 20px auto; display: grid; grid-template-columns: 420px 1fr; gap: 35px; padding: 0 25px; align-items: start; }
.card-form {
background: var(--azul-medio);
padding: 30px;
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.1);
position: fixed;
width: 320px;
top: 210px;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
max-height: calc(100vh - 240px);
overflow-y: auto;
z-index: 900;
}
.card-form::-webkit-scrollbar { width: 8px; }
.card-form::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
.card-form::-webkit-scrollbar-thumb { background: var(--azul-claro); border-radius: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.full { grid-column: span 1; }
input, select, textarea {
width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--azul-claro);
background: var(--azul-oscuro);
color: #ffffff;
box-sizing: border-box;
font-size: 0.95em;
}
input[type="datetime-local"] {
cursor: pointer;
background: var(--azul-oscuro);
color: #ffffff;
}
input[type="datetime-local"]::-webkit-calendar-picker-indicator {
filter: invert(1) brightness(0.8);
cursor: pointer;
}
.read-only {
background: #000 !important;
color: var(--oro) !important;
font-weight: bold;
border: 2px solid var(--oro) !important;
text-align: center;
}
.read-only-comerciante {
background: #1a2639 !important;
color: #cccccc !important;
font-weight: bold;
border: 2px solid #444 !important;
text-align: center;
cursor: not-allowed;
}
.btn-submit {
width: 100%; background: var(--verde); color: white; border: none; padding: 18px;
border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-top: 20px;
}
.btn-submit:disabled {
background: #666;
cursor: not-allowed;
opacity: 0.5;
}
.comercio-card {
background: var(--azul-medio);
border-radius: 20px;
margin-bottom: 30px;
border-left: 15px solid var(--borravino);
display: flex;
overflow: hidden;
box-shadow: 0 8px 25px rgba(0,0,0,0.3);
transition: 0.3s;
}
.comercio-card.inactive { background: #121b29; border-left-color: #333; }
.visual-side { width: 160px; background: rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 25px; border-right: 1px solid rgba(255,255,255,0.05); }
.img-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; background: white; border: 3px solid var(--azul-claro); cursor: zoom-in; }
.info-side { flex: 1; padding: 25px; }
.comercio-header {
display: flex;
justify-content: space-between;
align-items: center;
margin: 0 0 15px 0;
gap: 15px;
flex-wrap: wrap;
}
.comercio-title {
font-size: 2.2em;
color: var(--oro);
margin: 0;
font-weight: 900;
line-height: 1;
}
.comercio-rubro {
font-size: 1.1em;
color: #ffffff;
margin: 0;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
white-space: nowrap;
}
.data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.data-box b { display: block; color: #cbd5e0; font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; }
.data-box span { font-size: 1.1em; color: white; font-weight: 600; }
.benefit-box { grid-column: span 2; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 10px; border-left: 4px solid var(--borravino); }
.highlight-ben { color: var(--verde) !important; font-size: 1.3em !important; font-weight: 800 !important; }
.btn-group { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
.btn-op { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
.btn-publicar {
padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 0.9em; transition: 0.3s;
background: var(--verde);
}
.btn-publicar.publicado {
background: #6c757d;
}
.btn-directo {
background: var(--celeste-habitat);
color: white;
border: none;
padding: 8px 10px;
border-radius: 8px;
text-decoration: none;
font-size: 10px;
font-weight: bold;
text-transform: uppercase;
transition: 0.3s;
text-align: center;
width: 120px;
display: inline-block;
}
.btn-directo:hover { background: var(--oro); color: var(--azul-oscuro); }
.btn-copiar-link {
background: #6c757d;
color: white;
border: none;
padding: 8px 10px;
border-radius: 8px;
font-size: 10px;
font-weight: bold;
cursor: pointer;
text-transform: uppercase;
width: 120px;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
}
.btn-copiar-link:hover { background: var(--verde); }
.btn-preview-sorteos {
background: var(--naranja);
color: white;
border: none;
padding: 8px 10px;
border-radius: 8px;
font-size: 10px;
font-weight: bold;
cursor: pointer;
text-transform: uppercase;
width: 120px;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
}
.btn-preview-sorteos:hover { background: #e67e22; }
.social-box { display: flex; align-items: center; gap: 10px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; }
.social-link {
width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
border-radius: 50%; text-decoration: none; font-size: 1.1em; transition: 0.3s;
}
.social-link:hover { transform: scale(1.15); filter: brightness(1.2); }
.bg-fb { background: #1877F2; color: white; }
.bg-ig { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); color: white; }
.bg-tk { background: #000000; color: white; border: 1px solid #fff; }
.bg-web { background: #00d2ff; color: white; }
.owner-email {
display: flex; align-items: center; gap: 8px; color: var(--oro); text-decoration: none;
font-weight: bold; font-size: 0.9em; padding: 6px 14px; background: rgba(255,193,7,0.15);
border-radius: 20px; border: 1px solid var(--oro); transition: 0.3s;
}
.owner-email:hover { background: var(--oro); color: var(--azul-oscuro); }
#modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
#modal-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
details {
background: rgba(255,140,0,0.1);
border: 1px solid var(--naranja);
border-radius: 10px;
margin-top: 15px;
overflow: hidden;
}
summary {
padding: 12px;
cursor: pointer;
font-weight: bold;
color: var(--naranja);
display: flex;
justify-content: space-between;
align-items: center;
list-style: none;
}
summary::-webkit-details-marker {
display: none;
}
summary::after {
content: "▼";
font-size: 0.8em;
transition: transform 0.3s;
}
details[open] summary::after {
transform: rotate(180deg);
}
.form-group {
margin-bottom: 12px;
}
.form-group label {
display: block;
font-size: 0.85em;
color: var(--oro);
margin-bottom: 5px;
font-weight: 600;
}
.form-group input,
.form-group textarea {
width: 100%;
padding: 10px;
border-radius: 6px;
border: 1px solid var(--azul-claro);
background: var(--azul-oscuro);
color: #ffffff;
box-sizing: border-box;
font-size: 0.95em;
font-family: inherit;
}
.form-group textarea {
resize: vertical;
min-height: 60px;
}
</style>
</head>

window.actualizarLocalidades = async (seleccionada = "") => {
const prov = document.getElementById('provincia-input').value;
const ciudadSelect = document.getElementById('ciudad-input');
ciudadSelect.innerHTML = '<option value="">Cargando localidades...</option>';
if (!prov) {
ciudadSelect.innerHTML = '<option value="">Ciudad / Localidad</option>';
return;
}
try {
const response = await fetch(`https://apis.datos.gob.ar/georef/api/municipios?provincia=${encodeURIComponent(prov)}&max=1000&campos=id,nombre`);
const data = await response.json();
ciudadSelect.innerHTML = '<option value="">Seleccionar Localidad</option>';
if (data.municipios && data.municipios.length > 0) {
data.municipios.sort((a, b) => a.nombre.localeCompare(b.nombre)).forEach(m => {
const opt = document.createElement('option');
opt.value = m.nombre;
opt.textContent = m.nombre;
ciudadSelect.appendChild(opt);
});
} else {
const respLoc = await fetch(`https://apis.datos.gob.ar/georef/api/localidades?provincia=${encodeURIComponent(prov)}&max=1000&campos=nombre`);
const dataLoc = await respLoc.json();
dataLoc.localidades.sort((a, b) => a.nombre.localeCompare(b.nombre)).forEach(l => {
const opt = document.createElement('option');
opt.value = l.nombre;
opt.textContent = l.nombre;
ciudadSelect.appendChild(opt);
});
}
if (seleccionada) ciudadSelect.value = seleccionada;
} catch (error) {
console.error("Error cargando localidades:", error);
ciudadSelect.innerHTML = '<option value="">Error al cargar</option>';
}
};
