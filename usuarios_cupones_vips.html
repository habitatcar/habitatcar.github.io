            100% {

            position: relative;
            z-index: 1;
        }

        .btn-sorteo.animar-pulso::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 15px;
            background: rgba(245, 124, 0, 0.3);
            animation: onda-expansiva 1.5s infinite;
            z-index: -1;

        @keyframes onda-expansiva {

                width: 100%;
                height: 100%;
                opacity: 1;
            }
            100% {
                width: 140%;
                height: 140%;

            storageBucket: "habitatcar-pro.firebasestorage.app",
            messagingSenderId: "311691258694",
            appId: "1:311691258694:web:17a09051dcea7707af9347"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let scanner = null;
        let listaComercios = [];
        let intervalosAlternancia = {};

        function obtenerNombreParcial(nombreCompleto) {
            if (!nombreCompleto) return "Anónimo";
            const partes = nombreCompleto.split(' ');
            if (partes.length === 0) return "Anónimo";
            
            const primerNombre = partes[0];
            const nombreCorto = primerNombre.length > 6 ? primerNombre.substring(0, 6) + '...' : primerNombre;
            
            if (partes.length > 1) {
                const apellido = partes[partes.length - 1];
                const letraApellido = apellido.charAt(0).toUpperCase();
                return `${nombreCorto} ${letraApellido}.`;
            }
            return nombreCorto;
        }

        async function verificarSorteoFinalizado(comercioId, tituloSorteo) {
            if (!tituloSorteo) return null;
            
            const q = query(
                collection(db, "historial_sorteos"),
                where("comercio", "==", comercioId),
                where("premio", "==", tituloSorteo)
            );
            
            const snap = await getDocs(q);
            if (!snap.empty) {
                return snap.docs[0].data().ganadores || [];
            }
            return null;
        }

        window.verGanadores = (ganadores, comercioId, tituloSorteo) => {
            const lista = document.getElementById('lista-ganadores-modal');
            lista.innerHTML = '';
            
            ganadores.forEach((g, index) => {
                const nombreParcial = obtenerNombreParcial(g.nombreMostrar || g.nombre || "Participante");
                const provincia = g.provincia || "No especificada";
                const localidad = g.localidad || "No especificada";
                const numeroPremio = g.numeroPremio || (ganadores.length === 1 ? "Ganador" : `${index + 1}º Premio`);
                
                lista.innerHTML += `
                    <div class="ganador-item">
                        <div class="ganador-nombre">${numeroPremio}: ${nombreParcial}</div>
                        <div class="ganador-localidad">
                            <i class="fas fa-map-marker-alt"></i> ${localidad}, ${provincia}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('overlay-ganadores').style.display = 'flex';
            
            localStorage.setItem(`visto_ganadores_${comercioId}_${tituloSorteo}`, 'true');
            
            if (intervalosAlternancia[comercioId]) {
                clearInterval(intervalosAlternancia[comercioId]);
                delete intervalosAlternancia[comercioId];
            }
            
            setTimeout(() => {
                location.reload();
            }, 1000);
        };

        window.cerrarModalGanadores = () => {
            document.getElementById('overlay-ganadores').style.display = 'none';
        };

        function iniciarAlternanciaTexto(btn, comercioId, ganadores, tituloSorteo) {
            let alternando = true;
            let textoActual = 'sorteos';
            
            btn.onclick = () => {
                if (alternando) {
                    verGanadores(ganadores, comercioId, tituloSorteo);
                } else {
                    window.location.href = `usuarios_sorteos_promos.html?id=${encodeURIComponent(btn.dataset.nombre)}`;
                }
            };
            
            if (intervalosAlternancia[comercioId]) {
                clearInterval(intervalosAlternancia[comercioId]);
            }
            
            intervalosAlternancia[comercioId] = setInterval(() => {
                if (textoActual === 'sorteos') {
                    btn.innerHTML = '🏆 VER GANADOR';
                    textoActual = 'ganador';
                    alternando = false;
                } else {
                    btn.innerHTML = '🎁 SORTEOS y PROMOS';
                    textoActual = 'sorteos';
                    alternando = true;
                }
            }, 3000);
        }

        onSnapshot(collection(db, "comercios"), async (snap) => {
            const contenedor = document.getElementById('contenedor-vip');
            let html = "";
            listaComercios = [];

            for (const d of snap.docs) {
                const c = d.data();
                if (c.estado === "inactivo") continue;
                const id = d.id;
                
                const nUso = parseInt(localStorage.getItem('uso_vip_' + id) || "0");
                const tieneRedes = (c.facebook || c.instagram || c.web || c.sitioWeb);
                const htmlLogo = c.logoUrl 
                    ? `<div class="logo-container"><img src="${c.logoUrl}" class="logo-c"></div>` 
                    : '';

                const tieneSorteo = c.titulo_sorteo ? true : false;
                const tienePromo = c.titulo_promo ? true : false;
                const tieneSorteoOPromo = tieneSorteo || tienePromo;
                
                let ganadores = null;
                if (tieneSorteo) {
                    ganadores = await verificarSorteoFinalizado(c.nombre, c.titulo_sorteo);
                }
                
                const yaVioGanadores = ganadores ? localStorage.getItem(`visto_ganadores_${id}_${c.titulo_sorteo}`) : null;
                
                if (ganadores) {
                    if (!window.ganadoresTemp) window.ganadoresTemp = {};
                    window.ganadoresTemp[id] = ganadores;
                }
                
                let botonSorteo = '';
                
                if (tieneSorteoOPromo) {
                    if (ganadores && ganadores.length > 0 && !yaVioGanadores) {
                        botonSorteo = `
                            <button class="btn-act btn-sorteo" 
                                    id="btn-sorteo-${id}" 
                                    data-nombre="${c.nombre}"
                                    data-ganadores="true"
                                    data-comercio-id="${id}"
                                    data-titulo="${c.titulo_sorteo}">
                                🎁 SORTEOS y PROMOS
                            </button>
                        `;
                    }
                    else {
                        const yaTocado = localStorage.getItem('toco_sorteo_' + id) === 'true';
                        const claseAnimacion = yaTocado ? 'sin-pulso' : 'animar-pulso';
                        
                        botonSorteo = `
                            <button class="btn-act btn-sorteo ${claseAnimacion}" 
                                    id="btn-sorteo-${id}" 
                                    data-nombre="${c.nombre}"
                                    onclick="tocarSorteo('${id}', '${c.nombre}')">
                                🎁 SORTEOS y PROMOS
                            </button>
                        `;
                    }
                }

                listaComercios.push({id, ...c});
                
                html += `
                    <div class="card-vip" data-nombre="${(c.nombre || '').toLowerCase()}">
                        ${htmlLogo}
                        <div class="nombre-c">${c.nombre || ''}</div>
                        <div class="beneficio-c">${c.descVip || 0}% OFF</div>
                        <div class="vence-vip">★ Vence en ${c.vigenciaVip || 'X'} días ★</div>
                        <div class="btn-stack">
                            ${tieneRedes ? `<button class="btn-act btn-conozca" onclick="verRedes('${id}')">Conozca el comercio</button>` : ''}
                            ${botonSorteo}
                            <button class="btn-act btn-llegar" onclick="window.open('${c.mapsUrl ? c.mapsUrl : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((c.direccion || '') + ' ' + (c.ciudad || '') + ' ' + (c.provincia || ''))}`}')">Cómo llegar</button>
                            <button class="btn-act btn-validar" id="btn-val-${id}" onclick="abrirQR('${id}', '${c.tokenQR}')">Validar con QR</button>
                            <button class="btn-act btn-usar" id="btn-usar-${id}" onclick="preguntarCajeroVIP('${id}', '${c.nombre}', '${c.descVip}% OFF')">
                                Usar beneficio <span class="contador-nube">${nUso}</span>
                            </button>
                        </div>
                    </div>`;
            }
            
            contenedor.innerHTML = html;
            
            document.querySelectorAll('[data-ganadores="true"]').forEach(btn => {
                const id = btn.dataset.comercioId;
                const titulo = btn.dataset.titulo;
                const nombre = btn.dataset.nombre;
                const ganadores = window.ganadoresTemp ? window.ganadoresTemp[id] : null;
                
                if (ganadores && ganadores.length > 0) {
                    iniciarAlternanciaTexto(btn, id, ganadores, titulo);
                    btn.dataset.nombre = nombre;
                }
            });
        });

        window.tocarSorteo = (id, nombre) => {
            const btn = document.getElementById(`btn-sorteo-${id}`);
            if (btn) {
                btn.classList.remove('animar-pulso');
                btn.classList.add('sin-pulso');
                localStorage.setItem('toco_sorteo_' + id, 'true');
            }
            window.location.href = `usuarios_sorteos_promos.html?id=${encodeURIComponent(nombre)}`;
        };

        window.verRedes = (id) => {
            const c = listaComercios.find(x => x.id === id);
            if (!c) return;
            
            const overlay = document.createElement('div');
            overlay.className = 'redes-overlay';
            overlay.onclick = () => overlay.remove();
            
            let btns = "";
            if(c.facebook) btns += `<a href="${c.facebook}" target="_blank" class="btn-red" style="background:var(--facebook)">Facebook</a>`;
            if(c.instagram) btns += `<a href="${c.instagram}" target="_blank" class="btn-red" style="background:var(--instagram)">Instagram</a>`;
            if(c.web) btns += `<a href="${c.web}" target="_blank" class="btn-red" style="background:var(--tiktok); border:1px solid white;">TikTok</a>`;
            if(c.sitioWeb) btns += `<a href="${c.sitioWeb}" target="_blank" class="btn-red" style="background:var(--azul-web)">Sitio Web</a>`;
            
            overlay.innerHTML = `<div class="redes-box" onclick="event.stopPropagation()">
                <h3 style="color:var(--dorado); margin-top:0;">${c.nombre}</h3>
                ${btns}
                <button onclick="this.closest('.redes-overlay').remove()" style="margin-top:15px; background:none; border:none; color:gray; font-weight:bold;">CERRAR</button>
            </div>`;
            document.body.appendChild(overlay);
        };

        window.abrirQR = (id, token) => {
            document.getElementById('modal-qr').style.display = 'flex';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if (text.trim() === token.trim()) {
                    cerrarScanner();
                    document.getElementById(`btn-usar-${id}`).classList.add('activo');
                    document.getElementById(`btn-val-${id}`).style.display = 'none';
                    
                    const overlay = document.createElement('div');
                    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:9000;";
                    overlay.innerHTML = `
                        <div style="background:white;padding:30px;border-radius:20px;text-align:center;max-width:80%; border:5px solid var(--dorado);">
                            <div style="font-size:60px; margin-bottom:15px;">✅</div>
                            <b style="color:black;font-size:24px;display:block;margin-bottom:10px;">QR VALIDADO</b>
                            <p style="color:#333;font-size:18px;margin:0;font-weight:600;">Ahora pulse el botón "USAR BENEFICIO"</p>
                        </div>`;
                    document.body.appendChild(overlay);
                    setTimeout(() => overlay.remove(), 4000);
                } else {
                    cerrarScanner();
                    document.getElementById('overlay-error-vip').style.display = 'flex';
                }
            }).catch(e => console.error(e));
        };

        window.cerrarScanner = () => {
            document.getElementById('modal-qr').style.display = 'none';
            if(scanner) scanner.stop().then(() => scanner.clear());
        };

        window.cerrarErrorVIP = () => {
            document.getElementById('overlay-error-vip').style.display = 'none';
        };

        window.preguntarCajeroVIP = (id, nombre, beneficio) => {
            const btn = document.getElementById(`btn-usar-${id}`);
            if (!btn || !btn.classList.contains('activo')) return;
            const alerta = document.createElement('div');
            alerta.className = 'advertencia-overlay';
            alerta.id = 'alerta-cajero';
            alerta.innerHTML = `
                <div class="advertencia-contenido">
                    <h3 style="color:red;">⚠️ ATENCIÓN</h3>
                    <p>¿Avisaste al cajero que usarás el cupón <b>VIP</b>?<br><br><b>Si no avisaste, perderás el beneficio.</b></p>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-si" onclick="finalizarVIP('${id}', '${nombre}', '${beneficio}')">SÍ</button>
                        <button class="btn-no" onclick="document.getElementById('alerta-cajero').remove()">NO</button>
                    </div>
                </div>`;
            document.body.appendChild(alerta);
        };

        window.finalizarVIP = async (id, nom, ben) => {
            document.getElementById('alerta-cajero').remove();
            
            try {
                const ahora = Date.now();
                const fechaLegible = new Date().toLocaleString('es-AR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const comercioRef = doc(db, "comercios", id);
                
                const snapComercio = await getDoc(comercioRef);
                const dataCom = snapComercio.data();
                const proximoNro = (dataCom.totalVips || 0) + 1;
                const codigoIdentidad = "VIP-" + proximoNro.toString().padStart(4, '0');

                await updateDoc(comercioRef, {
                    totalVips: increment(1),
                    vipsHoy: increment(1),
                    vipsSemana: increment(1),
                    vipsMes: increment(1),
                    vipsAnio: increment(1),
                    lastSubmission: fechaLegible 
                });

                const leadId = localStorage.getItem('leadId_v16');
                if (leadId) {
                    const idComercioLimpio = nom.replace(/\s+/g, '_');
                    const horaL = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
                    const nUso = new Date().toLocaleDateString();

                    await updateDoc(doc(db, "leads", leadId), {
                        [`canjes_por_comercio.${idComercioLimpio}`]: {
                            comercio: nom,
                            codigo: codigoIdentidad,
                            fecha: nUso,
                            hora: horaL,
                            cantidad_usos: increment(1)
                        },
                        usos_count: increment(1)
                    });
                }

                JsBarcode("#barcodeVIP", codigoIdentidad, {
                    format: "CODE128",
                    lineColor: "#000",
                    width: 2.2,
                    height: 45,
                    displayValue: true,
                    fontSize: 18,
                    fontOptions: "bold" 
                });

                document.getElementById('exito-comercio').innerText = nom;
                document.getElementById('exito-beneficio').innerText = ben;
                document.getElementById('pantalla-exito').style.display = 'flex';

                const nUsoLocal = parseInt(localStorage.getItem('uso_vip_' + id) || "0") + 1;
                
                await addDoc(collection(db, "logs_actividad"), {
                    timestamp: ahora,
                    tipo: "canje",
                    accion: "CANJE VIP",
                    nombre: `${codigoIdentidad} canjeó ${ben} en ${nom}`,
                    comercioId: id,
                    modulo: "VIPS"
                });

                await addDoc(collection(db, "logs_vip"), { 
                    comercio: nom, 
                    comercioId: id,
                    fecha: serverTimestamp(), 
                    uso_nro: nUsoLocal,
                    tipo: "VIP",
                    beneficio: ben,
                    codigoGenerado: codigoIdentidad
                });

                localStorage.setItem('uso_vip_' + id, nUsoLocal);

                let s = 30;
                const t = setInterval(() => {
                    s--;
                    document.getElementById('countdown').innerText = s;
                    if(s <= 0) { 
                        clearInterval(t); 
                        location.reload(); 
                    }
                }, 1000);
            } catch(e) { 
                console.error("Error al registrar en Log:", e);
                alert("Error de conexión con el servidor de Logs.");
            }
        };

        window.filtrar = () => {
            const texto = document.getElementById('filtroNombre').value.toLowerCase();
            document.querySelectorAll('.card-vip').forEach(c => {
                c.style.display = c.dataset.nombre.includes(texto) ? 'block' : 'none';
            });
        };

        // POPUP DE POSTULACIONES
        window.abrirPopupPostulaciones = () => {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.95); display: flex; justify-content: center;
                align-items: center; z-index: 10000;
            `;
            
            overlay.innerHTML = `
                <div style="background: #111; border-radius: 30px; padding: 30px; width: 85%; max-width: 280px; text-align: center; border: 4px solid var(--dorado);">
                    <h3 style="color: var(--dorado); margin-top: 0; font-size: 1.4em; font-weight: 700; margin-bottom: 20px;">¿QUÉ DESEAS POSTULAR?</h3>
                    
                    <button onclick="window.location.href='usuarios_comercios_postulacion.html'" 
                            style="width: 100%; padding: 14px; margin: 8px 0; background: var(--azul-lindo); color: white; border: 3px solid var(--dorado); border-radius: 15px; font-weight: 600; font-size: 1.1em; cursor: pointer; text-transform: uppercase; font-family: 'Inter', sans-serif;">
                        🏪 COMERCIO
                    </button>
                    
                    <button onclick="alert('Próximamente podrás postularte como MARTILLERO')" 
                            style="width: 100%; padding: 14px; margin: 8px 0; background: #333; color: #ccc; border: 2px solid #666; border-radius: 15px; font-weight: 600; font-size: 1.1em; cursor: pointer; font-family: 'Inter', sans-serif;">
                        🔑 MARTILLERO (próximamente)
                    </button>
                    
                    <button onclick="alert('Próximamente podrás postularte como COLABORADOR')" 
                            style="width: 100%; padding: 14px; margin: 8px 0; background: #333; color: #ccc; border: 2px solid #666; border-radius: 15px; font-weight: 600; font-size: 1.1em; cursor: pointer; font-family: 'Inter', sans-serif;">
                        👥 COLABORADOR (próximamente)
                    </button>
                    
                    <button onclick="this.closest('div').closest('div').remove()" 
                            style="width: 100%; padding: 12px; margin-top: 20px; background: var(--gris-volver); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1em; cursor: pointer; font-family: 'Inter', sans-serif;">
                        CERRAR
                    </button>
                </div>
            `;
            
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });
            
            document.body.appendChild(overlay);
        };
    </script>

    <script>
    // ===========================================
    // SISTEMA DE INSTALACIÓN PWA - IGUAL QUE LEADS
    // ===========================================
    (function() {
        let deferredPrompt;
        const yaInstalado = localStorage.getItem('habitat_pwa_instalada') === 'true';
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ Evento beforeinstallprompt capturado (VIP)');
        });

        function mostrarMensajeInstalacion() {
            // Eliminar cualquier popup anterior
            const popupAnterior = document.querySelector('.popup-instalacion');
            if (popupAnterior) popupAnterior.remove();
            
            // Crear overlay personalizado
            const overlay = document.createElement('div');
            overlay.className = 'popup-instalacion';
            
            // Logo en SVG (no se comprime)
            const logoSvg = `<svg width="70" height="70" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="20" fill="#003D80"/>
                <path d="M30 30H70V40H30V30Z" fill="white"/>
                <path d="M30 45H60V55H30V45Z" fill="white"/>
                <path d="M30 60H50V70H30V60Z" fill="white"/>
                <circle cx="75" cy="75" r="15" fill="#FFD700"/>
                <path d="M70 70L80 80M80 70L70 80" stroke="#003D80" stroke-width="3"/>
            </svg>`;
            
            if (yaInstalado) {
                // Mensaje para cuando ya está instalada
                overlay.innerHTML = `
                    <div class="popup-contenido">
                        ${logoSvg}
                        <h3>¡YA ESTÁ INSTALADA!</h3>
                        <p><strong>Nuestra aplicación ya se encuentra en tu dispositivo.</strong><br>Buscá el ícono de Hábitat-Car entre tus aplicaciones.</p>
                        <div class="popup-botones">
                            <button class="btn-popup btn-popup-aceptar" style="flex: 1;" id="btn-ok-instalada">ACEPTAR</button>
                        </div>
                    </div>
                `;
            } else if (!deferredPrompt) {
                // Mensaje para cuando no soporta instalación
                overlay.innerHTML = `
                    <div class="popup-contenido">
                        ${logoSvg}
                        <h3>INSTALACIÓN</h3>
                        <p>Para instalar la aplicación, buscá en el menú de tu navegador la opción <strong>"Agregar a pantalla de inicio"</strong>.</p>
                        <div class="popup-botones">
                            <button class="btn-popup btn-popup-aceptar" style="flex: 1;" id="btn-ok-soporte">ENTENDIDO</button>
                        </div>
                    </div>
                `;
            } else {
                // Mensaje para instalar
                overlay.innerHTML = `
                    <div class="popup-contenido">
                        ${logoSvg}
                        <h3>¡INSTALÁ LA APLICACIÓN!</h3>
                        <p><strong>Para no perderte los beneficios VIP</strong> y tener acceso rápido desde tu pantalla de inicio.</p>
                        <div class="popup-botones">
                            <button class="btn-popup btn-popup-aceptar" id="btn-instalar-confirmar">INSTALAR</button>
                            <button class="btn-popup btn-popup-cancelar" id="btn-instalar-cancelar">RECHAZAR</button>
                        </div>
                    </div>
                `;
            }
            
            document.body.appendChild(overlay);
            
            // Manejadores de eventos
            if (yaInstalado) {
                document.getElementById('btn-ok-instalada')?.addEventListener('click', () => overlay.remove());
            } else if (!deferredPrompt) {
                document.getElementById('btn-ok-soporte')?.addEventListener('click', () => overlay.remove());
            } else {
                document.getElementById('btn-instalar-confirmar')?.addEventListener('click', function() {
                    overlay.remove();
                    // SIMULAMOS INSTALACIÓN SIN CARTEL FEO
                    localStorage.setItem('habitat_pwa_instalada', 'true');
                    alert('✅ Aplicación instalada correctamente. Buscá el ícono en tu pantalla de inicio.');
                });
                
                document.getElementById('btn-instalar-cancelar')?.addEventListener('click', function() {
                    overlay.remove();
                });
            }
        }

        // Configurar botón del footer
        document.addEventListener('DOMContentLoaded', function() {
            const btnInstalar = document.getElementById('btn-instalar-footer');
            if (btnInstalar) {
                btnInstalar.addEventListener('click', mostrarMensajeInstalacion);
            }
        });
    })();
    </script>
</body>
</html>
