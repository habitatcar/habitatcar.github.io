        @keyframes destello-centrifugo {

            100% {

            }

        @keyframes borde-brillante {

            z-index: 1;
        }

        .btn-sorteo.animar-pulso::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 15px;
            background: rgba(245, 124, 0, 0.3);
            animation: onda-expansiva 1.5s infinite;
            z-index: -1;

        @keyframes onda-expansiva {
            0% {
                width: 100%;
                height: 100%;
                opacity: 1;
            }
            100% {
                width: 140%;
                height: 140%;

    <script>
    // ===========================================
    // SISTEMA DE INSTALACIÓN PWA - VIP
    // ===========================================
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('✅ Evento beforeinstallprompt capturado (VIP)');
    });

    document.addEventListener('DOMContentLoaded', function() {
        const btnInstalar = document.getElementById('btn-instalar-footer');
        
        if (btnInstalar) {
            btnInstalar.addEventListener('click', function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('✅ Usuario aceptó la instalación (VIP)');
                        } else {
                            console.log('❌ Usuario rechazó la instalación (VIP)');
                        }
                        deferredPrompt = null;
                    });
                } else {
                    alert('La app ya está instalada o tu navegador no soporta instalación');
                }
            });
        }
    });
    </script>
